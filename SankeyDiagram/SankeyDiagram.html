<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Sankey Recursos</title>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
}

#chart{
width:100vw;
height:100vh;
}

.link{
fill:none;
stroke-opacity:0.6;
}

.node rect{
stroke:#000;
}

text{
font-size:14px;
}

</style>

</head>

<body>

<div id="chart"></div>

<script>

const width = window.innerWidth
const height = window.innerHeight

const svg = d3.select("#chart")
.append("svg")
.attr("width",width)
.attr("height",height)

/* NODES */

const nodes = [

{name:"Rastreador"},

{name:"Aéreos"},
{name:"Brigadistas"},
{name:"Veículos"},

{name:"Avião"},
{name:"Helicóptero"},

{name:"Brigadista Fixo"},
{name:"Brigadista Spot"},

{name:"Veículo Pipa Fixo"},
{name:"Veículo Spot"},
{name:"Veículo 4x2"},
{name:"Veículo Multiuso"},
{name:"Veículo 4x4"},

{name:"UP1"},
{name:"UP2"},
{name:"UP3"},
{name:"UP4"},
{name:"UP5"}

]

/* CORES DAS CATEGORIAS */

const colorMap = {

"Aéreos":"#3498db",
"Avião":"#3498db",
"Helicóptero":"#3498db",

"Brigadistas":"#e74c3c",
"Brigadista Fixo":"#e74c3c",
"Brigadista Spot":"#e74c3c",

"Veículos":"#2ecc71",
"Veículo Pipa Fixo":"#2ecc71",
"Veículo Spot":"#2ecc71",
"Veículo 4x2":"#2ecc71",
"Veículo Multiuso":"#2ecc71",
"Veículo 4x4":"#2ecc71"

}

/* LINKS */

const links = [

{source:"Rastreador",target:"Aéreos",value:50},
{source:"Rastreador",target:"Brigadistas",value:120},
{source:"Rastreador",target:"Veículos",value:100},

{source:"Aéreos",target:"Avião",value:30},
{source:"Aéreos",target:"Helicóptero",value:20},

{source:"Brigadistas",target:"Brigadista Fixo",value:70},
{source:"Brigadistas",target:"Brigadista Spot",value:50},

{source:"Veículos",target:"Veículo Pipa Fixo",value:30},
{source:"Veículos",target:"Veículo Spot",value:20},
{source:"Veículos",target:"Veículo 4x2",value:15},
{source:"Veículos",target:"Veículo Multiuso",value:20},
{source:"Veículos",target:"Veículo 4x4",value:15},

{source:"Avião",target:"UP1",value:15},
{source:"Avião",target:"UP2",value:15},

{source:"Helicóptero",target:"UP3",value:10},
{source:"Helicóptero",target:"UP4",value:10},

{source:"Brigadista Fixo",target:"UP1",value:35},
{source:"Brigadista Fixo",target:"UP2",value:35},

{source:"Brigadista Spot",target:"UP4",value:25},
{source:"Brigadista Spot",target:"UP5",value:25},

{source:"Veículo Pipa Fixo",target:"UP1",value:30},
{source:"Veículo Spot",target:"UP2",value:20},
{source:"Veículo 4x2",target:"UP3",value:15},
{source:"Veículo Multiuso",target:"UP4",value:20},
{source:"Veículo 4x4",target:"UP5",value:15}

]

/* MAPA DE INDICES */

const nodeIndex={}
nodes.forEach((d,i)=>nodeIndex[d.name]=i)

/* CONVERTER LINKS */

const graphLinks = links.map(d=>{

let color = colorMap[d.source] || colorMap[d.target] || "#999"

return{
source:nodeIndex[d.source],
target:nodeIndex[d.target],
value:d.value,
color:color
}

})

/* SANKEY */

const sankey = d3.sankey()
.nodeWidth(25)
.nodePadding(18)
.extent([[1,1],[width-1,height-6]])

const graph = sankey({
nodes:nodes.map(d=>Object.assign({},d)),
links:graphLinks.map(d=>Object.assign({},d))
})

/* DESENHAR LINKS */

svg.append("g")
.selectAll("path")
.data(graph.links)
.enter()
.append("path")
.attr("class","link")
.attr("d",d3.sankeyLinkHorizontal())
.attr("stroke",d=>d.color)
.attr("stroke-width",d=>Math.max(1,d.width))

/* DESENHAR NODES */

const node = svg.append("g")
.selectAll("g")
.data(graph.nodes)
.enter()
.append("g")

node.append("rect")
.attr("x",d=>d.x0)
.attr("y",d=>d.y0)
.attr("height",d=>d.y1-d.y0)
.attr("width",d=>d.x1-d.x0)
.attr("fill",d=>colorMap[d.name] || "#999")

/* LABELS */

node.append("text")
.attr("x",d=>d.x0 - 6)
.attr("y",d=> (d.y1 + d.y0)/2 )
.attr("dy","0.35em")
.attr("text-anchor","end")
.text(d=>d.name)
.filter(d=>d.x0 < width/2)
.attr("x",d=>d.x1 + 6)
.attr("text-anchor","start")

</script>

</body>
</html>
