<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Sankey Recursos</title>

<script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>

<style>

body{
font-family:Arial;
}

#chart{
width:1100px;
height:650px;
margin:auto;
}

</style>

</head>

<body>

{

},

{
source:"Avião",
target:"UP2",
value:15,
lineStyle:{color:"#3498db"}
},

{
source:"Helicóptero",
